# Dependabot config. V modules are not a supported ecosystem, so this keeps
# the one thing Dependabot can track for this repo up to date: GitHub Actions
# used in workflows.
version: 2
updates:
  # GitHub Actions - bumps action versions across .github/workflows/*.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
