name: CI

on:
  push:
    branches:
      - master
      - "feat/**"
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds the pinned V compiler and clones/symlinks raknet, nbt and
      # protocol into ~/.vmodules.
      - name: Setup V
        uses: ./.github/actions/setup-v

      # setup-v symlinks the protocol repo root, but the module's code lives
      # under src/ and imports its siblings (types, serializer, enums) as
      # top-level modules. Repoint protocol and add those, matching the
      # Dockerfile, so imports resolve.
      - name: Fix protocol module layout
        run: |
          git -C "$HOME/vedrock-deps/protocol" fetch --unshallow --quiet || true
          git -C "$HOME/vedrock-deps/protocol" checkout 9d54e57
          rm -f ~/.vmodules/protocol
          ln -s "$HOME/vedrock-deps/protocol/src" ~/.vmodules/protocol
          ln -sf "$HOME/vedrock-deps/protocol/src/enums" ~/.vmodules/enums
          ln -sf "$HOME/vedrock-deps/protocol/src/types" ~/.vmodules/types
          ln -sf "$HOME/vedrock-deps/protocol/src/serializer" ~/.vmodules/serializer

      # server/world/db needs leveldb for both the build and the tests.
      - name: Install leveldb module
        run: git clone --depth 1 https://github.com/vlang/leveldb ~/.vmodules/leveldb

      # Runs the unit test suite. main.v is moved aside for the run so the root
      # program entry is not pulled into the test compilation on the hosted
      # runner (a V 0.5.2 quirk). The full binary build is validated by the
      # Docker CI workflow.
      - name: Test
        run: |
          mv main.v main.v.bak
          v test server
          status=$?
          mv main.v.bak main.v
          exit $status

  format:
    name: Format check
    runs-on: ubuntu-latest
    # The codebase is not fully vfmt-clean yet (20 files as of writing), so this
    # job is informational only and must not block merges. Drop continue-on-error
    # once `v fmt -w .` has been applied across the tree.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup V
        uses: ./.github/actions/setup-v

      - name: Verify formatting
        run: v fmt -verify .

  vet:
    name: Vet
    runs-on: ubuntu-latest
    # `v vet .` currently reports trailing-whitespace errors and missing-doc
    # warnings, so it is advisory only for now. Remove continue-on-error once
    # the reported issues are cleaned up.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup V
        uses: ./.github/actions/setup-v

      - name: Fix protocol module layout
        run: |
          rm -f ~/.vmodules/protocol
          ln -s "$HOME/vedrock-deps/protocol/src" ~/.vmodules/protocol
          ln -sf "$HOME/vedrock-deps/protocol/src/enums" ~/.vmodules/enums

      - name: Install leveldb module
        run: git clone --depth 1 https://github.com/vlang/leveldb ~/.vmodules/leveldb

      - name: Vet
        run: v vet .
