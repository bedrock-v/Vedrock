name: CI

on:
  push:
    branches:
      - master
      - "feat/**"
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This project builds only with V 0.5.1 (0c3183c) - the shared setup-v
      # action tracks a newer V that mis-compiles the codebase, so build the
      # pinned compiler here directly.
      - name: Build pinned V 0.5.1
        run: |
          git clone https://github.com/vlang/v ~/vlang
          git -C ~/vlang checkout 0c3183c
          git clone https://github.com/vlang/vc ~/vlang/vc
          git -C ~/vlang/vc checkout f461dfeb
          git clone --depth 1 --branch thirdparty-linux-amd64 https://github.com/vlang/tccbin ~/vlang/thirdparty/tcc
          make -C ~/vlang local=1
          echo "$HOME/vlang" >> "$GITHUB_PATH"

      # Clone and symlink the module dependencies, mirroring the Dockerfile
      # (protocol code lives under src/ and its siblings resolve as top-level
      # modules). protocol is pinned to the commit the project builds against.
      - name: Install dependencies
        run: |
          deps="$HOME/vedrock-deps"
          vmod="$HOME/.vmodules"
          mkdir -p "$deps" "$vmod"
          git clone --depth 1 https://github.com/bedrock-v/raknet "$deps/raknet"
          git clone --depth 1 https://github.com/bedrock-v/nbt "$deps/nbt"
          git clone https://github.com/bedrock-v/protocol "$deps/protocol"
          git -C "$deps/protocol" checkout 9d54e57
          ln -s "$deps/raknet" "$vmod/raknet"
          ln -s "$deps/raknet/message" "$vmod/message"
          ln -s "$deps/nbt" "$vmod/nbt"
          ln -s "$deps/protocol/src" "$vmod/protocol"
          ln -s "$deps/protocol/src/enums" "$vmod/enums"
          ln -s "$deps/protocol/src/types" "$vmod/types"
          ln -s "$deps/protocol/src/serializer" "$vmod/serializer"
          git clone --depth 1 https://github.com/vlang/leveldb "$vmod/leveldb"
          ~/vlang/v install nepinhum.i18n

      - name: Build
        run: v -prod . -o vedrock

      - name: Test
        run: v test server
          exit $status

  format:
    name: Format check
    runs-on: ubuntu-latest
    # The codebase is not fully vfmt-clean yet (20 files as of writing), so this
    # job is informational only and must not block merges. Drop continue-on-error
    # once `v fmt -w .` has been applied across the tree.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup V
        uses: ./.github/actions/setup-v

      - name: Verify formatting
        run: v fmt -verify .

  vet:
    name: Vet
    runs-on: ubuntu-latest
    # `v vet .` currently reports trailing-whitespace errors and missing-doc
    # warnings, so it is advisory only for now. Remove continue-on-error once
    # the reported issues are cleaned up.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup V
        uses: ./.github/actions/setup-v

      - name: Fix protocol module layout
        run: |
          rm -f ~/.vmodules/protocol
          ln -s "$HOME/vedrock-deps/protocol/src" ~/.vmodules/protocol
          ln -sf "$HOME/vedrock-deps/protocol/src/enums" ~/.vmodules/enums

      - name: Install leveldb module
        run: git clone --depth 1 https://github.com/vlang/leveldb ~/.vmodules/leveldb

      - name: Vet
        run: v vet .
