name: Nightly

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup V
        uses: ./.github/actions/setup-v

      - name: Install leveldb module
        run: git clone --depth 1 https://github.com/vlang/leveldb ~/.vmodules/leveldb

      - name: Build binaries
        run: |
          mkdir -p dist
          v -prod -o dist/vedrock-linux-amd64 .

      - name: Recreate nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes || true
          git push origin :refs/tags/nightly || true
          gh release create nightly \
            --prerelease \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Automated nightly build from \`master\` @ $(git rev-parse --short HEAD)" \
            --target "$GITHUB_SHA" \
            dist/vedrock-linux-amd64
