name: Setup V
description: Build the pinned V compiler (0.5.2 @ 7647ce1, vc @ 7e6aa83) and install module dependencies

runs:
  using: composite
  steps:
    - name: Cache V compiler
      id: cache-v
      uses: actions/cache@v4
      with:
        path: ~/vlang
        key: vlang-7647ce1-7e6aa83-${{ runner.os }}

    - name: Build pinned V
      if: steps.cache-v.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --filter=blob:none https://github.com/vlang/v ~/vlang
        cd ~/vlang
        git checkout 7647ce1c6fad63b5578bc07883139906de74b2f8
        git clone --filter=blob:none https://github.com/vlang/vc vc
        git -C vc checkout 7e6aa832b6b6456b5c7fd82c80cbfee2f2b08db1
        git clone --depth 1 --branch thirdparty-linux-amd64 https://github.com/vlang/tccbin thirdparty/tcc
        make local=1

    - name: Add V to PATH
      shell: bash
      run: |
        echo "$HOME/vlang" >> "$GITHUB_PATH"
        ~/vlang/v version

    - name: Install module dependencies
      shell: bash
      run: |
        deps="$HOME/vedrock-deps"
        vmod="$HOME/.vmodules"
        mkdir -p "$deps" "$vmod"
        git clone --depth 1 https://github.com/bedrock-v/raknet "$deps/raknet"
        git clone --depth 1 https://github.com/bedrock-v/nbt "$deps/nbt"
        git clone --depth 1 https://github.com/bedrock-v/protocol "$deps/protocol"
        ln -s "$deps/raknet" "$vmod/raknet"
        ln -s "$deps/raknet/message" "$vmod/message"
        ln -s "$deps/nbt" "$vmod/nbt"
        ln -s "$deps/protocol/src" "$vmod/protocol"
        ~/vlang/v install nepinhum.i18n
